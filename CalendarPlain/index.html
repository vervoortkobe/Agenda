<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calendar</title>
    <link rel="stylesheet" href="./css/reset.css">
    <link rel="stylesheet" href="./css/style.css">
    <script src="./js/script.js" defer></script>
  </head>
  <body>
    <!-- <header>
      <nav>
        <ul>
          <li>Home</li>
          <li>About</li>
          <li>Title</li>
        </ul>
      </nav>
    </header> -->
    <main>
      <div class="sidebarleft">
        <div class="sidebarleft_center">
          <h2>Calendar</h2>
          <div class="sidebarleft_center_grid">
            <div>
              <p class="dayname">DAGNAAM</p>
              <p class="date">DATUM</p>
            </div>
            <div class="time" id="time">
              <p id="hours">UREN</p>
              <hr>
              <p id="minutes">MINUTEN</p>
              <hr>
              <p id="seconds">SECONDEN</p>
            </div>
          </div>
        </div>
      </div>
      <div class="center">
        <div class="month">
          <h2 id="monthname">MAAND</h2>
          <ul id="daysul"></ul>
        </div>
      </div>
      <div class="sidebarright"></div>
    </main>
  </body>
</html>
